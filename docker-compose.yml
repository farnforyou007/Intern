version: '3.8'

services:
  internship-app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_LIFF_ID=${NEXT_PUBLIC_LIFF_ID}
        - NEXT_PUBLIC_JWT_SECRET=${NEXT_PUBLIC_JWT_SECRET}
        - NEXT_PUBLIC_LOGIN_URL=${NEXT_PUBLIC_LOGIN_URL}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_LIFF_URL=${NEXT_PUBLIC_LIFF_URL}
        - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
    image: farnforyou/internship-system:latest
    container_name: internship-app
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env.local
