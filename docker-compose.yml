version: '3.8'

services:
  internship-app:
    # ดึงอิมเมจจาก Docker Hub โดยตรง (ไม่ต้อง Build เอง)
    image: farnforyou/internship-system:v1
    container_name: internship-app
    ports:
      - "3000:3000"
    restart: always
    # โหลดค่าความลับ (เช่น Secret Key) จากไฟล์ .env.local ตอนรัน
    env_file:
      - .env.local
